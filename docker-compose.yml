x-default-logging: &default-logging
  logging:
    driver: "json-file"
    options:
      max-size: "10m"
      max-file: "3"

services:
  db:
    <<: *default-logging
    image: postgres:17.5-alpine
    env_file: .env
    environment:
      POSTGRES_DB: ${DB__NAME}
      POSTGRES_USER: ${DB__USERNAME}
      POSTGRES_PASSWORD: ${DB__PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB__USERNAME}"]
      interval: 30s
      timeout: 30s
      retries: 5

  app:
    <<: *default-logging
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: app
    env_file: .env
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "5000", "--workers", "1"]
    ports:
      - "5000:5000"
    volumes:
      - ./backend/src/migrations/versions:/app/migrations/versions
    user: "1000:1000"
    depends_on:
      db:
        condition: service_healthy
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 30s
      retries: 3

volumes:
  postgres_data:
