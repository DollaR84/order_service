{% extends "layout.html" %}

{% block title %}New Client{% endblock %}

{% block content %}

<div class="row justify-content-center">
    <div class="col-md-6">

        <div class="card shadow">

            <div class="card-header bg-success text-white">
                <h4 class="mb-0">Create Client</h4>
            </div>

            <div class="card-body">

                <form method="POST" action="{{ url_for('clients.new') }}" class="ajax-form">

                    <div class="mb-3">
                        <label class="form-label">First Name</label>
                        <input type="text" name="first_name" class="form-control" placeholder="John">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Last Name</label>
                        <input type="text" name="last_name" class="form-control" placeholder="Doe">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Phone Number</label>
                        <input type="text" id="phone-input" name="phone" class="form-control" placeholder="+38 (0__) ___-__-__">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Email (Optional)</label>
                        <input type="email" name="email" class="form-control" placeholder="example@mail.com">
                    </div>

                    <button type="submit" class="btn btn-success w-100">
                        Create
                    </button>

                    <a href="{{ url_for('clients.index') }}" class="btn btn-link w-100">
                        Back
                    </a>

                </form>

            </div>

        </div>

    </div>
</div>

{% endblock %}

{% block scripts %}
<script src="https://unpkg.com/imask"></script>
<script>
    const element = document.getElementById('phone-input');
    if (element) {
        const maskOptions = {
            mask: '+38 (000) 000-00-00',
            lazy: false
        };
        const mask = IMask(element, maskOptions);
    }
</script>
{% endblock %}
